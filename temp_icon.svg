<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  <!-- background -->
  <rect width="256" height="256" rx="24" fill="#1E1E1E"/>

  <!-- left document -->
  <rect x="40" y="40" width="72" height="160"
        fill="#252526"
        stroke="#E6EDF3"
        stroke-width="6"
        rx="6"/>

  <!-- right document -->
  <rect x="144" y="40" width="72" height="160"
        fill="#252526"
        stroke="#E6EDF3"
        stroke-width="6"
        rx="6"/>

  <!-- green diff lines -->
  <line x1="56" y1="90" x2="96" y2="90" stroke="#3FB950" stroke-width="6" stroke-linecap="round"/>
  <line x1="56" y1="120" x2="96" y2="120" stroke="#3FB950" stroke-width="6" stroke-linecap="round"/>
  <line x1="56" y1="150" x2="96" y2="150" stroke="#3FB950" stroke-width="6" stroke-linecap="round"/>

  <!-- red diff lines -->
  <line x1="160" y1="90" x2="200" y2="90" stroke="#F85149" stroke-width="6" stroke-linecap="round"/>
  <line x1="160" y1="120" x2="200" y2="120" stroke="#F85149" stroke-width="6" stroke-linecap="round"/>
  <line x1="160" y1="150" x2="200" y2="150" stroke="#F85149" stroke-width="6" stroke-linecap="round"/>

  <!-- compare arrows -->
  <line x1="118" y1="128" x2="138" y2="128" stroke="#E6EDF3" stroke-width="6" stroke-linecap="round"/>

  <polygon points="118,128 126,120 126,136"
           fill="#E6EDF3"/>

  <polygon points="138,128 130,120 130,136"
           fill="#E6EDF3"/>

</svg>